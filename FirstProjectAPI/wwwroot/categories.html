<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catégories — Plateforme de Formation</title>
  <link rel="stylesheet" href="/css/style.css?v=3" />
</head>
<body>
  <div class="dash-shell">
    <div class="dash-topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        PLATEFORME&nbsp;FORMATION
      </div>
      <div style="display:flex; align-items:center; gap:0.9rem;">
        <span class="role-badge" id="role-badge">…</span>
        <button class="btn-ghost" id="logout-btn">Se déconnecter</button>
      </div>
    </div>
    <nav class="admin-nav" id="admin-nav"></nav>

    <main class="page-main">
      <div class="page-header">
        <div>
          <h1>Catégories</h1>
          <p>Organisez vos formations par catégorie.</p>
        </div>
        <button class="btn-secondary" id="btn-new">+ Nouvelle catégorie</button>
      </div>

      <div class="table-wrap">
        <div id="table-loading" class="table-loading">Chargement…</div>
        <div id="table-error" class="table-error" style="display:none;"></div>
        <table class="data-table" id="table" style="display:none;">
          <thead>
            <tr>
              <th>Nom</th>
              <th>Formations liées</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
        <div id="empty-state" class="empty-state" style="display:none;">
          Aucune catégorie pour le moment.
        </div>
      </div>
    </main>
  </div>

  <!-- Panneau création / édition -->
  <div class="side-panel-overlay" id="panel-overlay">
    <div class="side-panel">
      <h2 id="panel-title">Nouvelle catégorie</h2>

      <div class="alert alert-error" id="panel-alert"></div>

      <form id="panel-form" novalidate>
        <div class="field" id="field-name">
          <label for="name">Nom de la catégorie</label>
          <input type="text" id="name" maxlength="100" required />
          <div class="error-msg">Le nom est requis (max. 100 caractères).</div>
        </div>

        <div class="panel-actions">
          <button type="submit" class="btn-primary" id="panel-submit">Enregistrer</button>
          <button type="button" class="btn-secondary" id="panel-cancel">Annuler</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js?v=3"></script>
  <script>
    let editingId = null; // null = création, sinon = édition de cet id

    const tableLoading = document.getElementById("table-loading");
    const tableError = document.getElementById("table-error");
    const table = document.getElementById("table");
    const tableBody = document.getElementById("table-body");
    const emptyState = document.getElementById("empty-state");

    const panelOverlay = document.getElementById("panel-overlay");
    const panelTitle = document.getElementById("panel-title");
    const panelForm = document.getElementById("panel-form");
    const panelAlert = document.getElementById("panel-alert");
    const panelSubmit = document.getElementById("panel-submit");
    const fieldName = document.getElementById("field-name");
    const nameInput = document.getElementById("name");

    function openPanel(categorie) {
      editingId = categorie ? categorie.id : null;
      panelTitle.textContent = categorie ? "Modifier la catégorie" : "Nouvelle catégorie";
      nameInput.value = categorie ? categorie.name : "";
      fieldName.classList.remove("has-error");
      panelAlert.classList.remove("show");
      panelOverlay.classList.add("show");
      nameInput.focus();
    }

    function closePanel() {
      panelOverlay.classList.remove("show");
      panelForm.reset();
    }

    document.getElementById("btn-new").addEventListener("click", () => openPanel(null));
    document.getElementById("panel-cancel").addEventListener("click", closePanel);
    panelOverlay.addEventListener("click", (e) => {
      if (e.target === panelOverlay) closePanel();
    });

    function renderRow(categorie) {
      const tr = document.createElement("tr");
      const nbFormations = categorie.formations ? categorie.formations.length : "—";
      tr.innerHTML = `
        <td>${escapeHtml(categorie.name)}</td>
        <td><span class="pill">${nbFormations}</span></td>
        <td class="col-actions">
          <button class="btn-icon" data-action="edit">Modifier</button>
          <button class="btn-icon danger" data-action="delete">Supprimer</button>
        </td>
      `;
      tr.querySelector('[data-action="edit"]').addEventListener("click", () => openPanel(categorie));
      tr.querySelector('[data-action="delete"]').addEventListener("click", () => handleDelete(categorie));
      return tr;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str ?? "";
      return div.innerHTML;
    }

    async function loadTable() {
      tableLoading.style.display = "block";
      tableError.style.display = "none";
      table.style.display = "none";
      emptyState.style.display = "none";

      try {
        const categories = await categoriesListRequest();
        tableLoading.style.display = "none";

        if (!categories || categories.length === 0) {
          emptyState.style.display = "block";
          return;
        }

        tableBody.innerHTML = "";
        categories.forEach((c) => tableBody.appendChild(renderRow(c)));
        table.style.display = "table";
      } catch (err) {
        tableLoading.style.display = "none";
        tableError.textContent = "Impossible de charger les catégories : " + err.message;
        tableError.style.display = "block";
      }
    }

    async function handleDelete(categorie) {
      if (!confirm(`Supprimer la catégorie « ${categorie.name} » ?`)) return;
      try {
        await categorieDeleteRequest(categorie.id);
        loadTable();
      } catch (err) {
        alert("Suppression impossible : " + err.message);
      }
    }

    panelForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      panelAlert.classList.remove("show");
      fieldName.classList.remove("has-error");

      const name = nameInput.value.trim();
      if (!name) {
        fieldName.classList.add("has-error");
        return;
      }

      panelSubmit.disabled = true;
      panelSubmit.textContent = "Enregistrement…";

      try {
        if (editingId) {
          await categorieUpdateRequest(editingId, { name });
        } else {
          await categorieCreateRequest({ name });
        }
        closePanel();
        loadTable();
      } catch (err) {
        panelAlert.textContent = err.message || "Une erreur est survenue.";
        panelAlert.classList.add("show");
      } finally {
        panelSubmit.disabled = false;
        panelSubmit.textContent = "Enregistrer";
      }
    });

    document.getElementById("logout-btn").addEventListener("click", () => {
      clearAuth();
      window.location.href = "/index.html";
    });

    (async () => {
      const auth = await guardAdminPage();
      if (!auth) return;
      renderAdminNav("/categories.html");
      loadTable();
    })();
  </script>
</body>
</html>
